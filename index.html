<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor de Informe</title>
<style>
  html, body { margin: 0; padding: 0; background: #525659; }
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: #323639; color: #fff; padding: 10px 16px;
    font-family: Arial, sans-serif; font-size: 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .toolbar a { color: #8ab4f8; text-decoration: none; }
  #pages { display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 12px; }
  #pages canvas { max-width: 100%; height: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
</style>
</head>
<body>
  <div class="toolbar">
    <span id="status">Cargando InfGorInf19593.pdf...</span>
    <a href="https://raw.githubusercontent.com/GorillaInforma/informe001/main/InfGorInf19593.pdf" target="_blank">Abrir en pestaña nueva ⬈</a>
  </div>
  <div id="pages"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const url = "https://raw.githubusercontent.com/GorillaInforma/informe001/main/InfGorInf19593.pdf";
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const status = document.getElementById("status");
    const container = document.getElementById("pages");

    pdfjsLib.getDocument(url).promise.then(pdf => {
      status.textContent = "InfGorInf19593.pdf (" + pdf.numPages + " páginas)";
      for (let i = 1; i <= pdf.numPages; i++) {
        pdf.getPage(i).then(page => {
          const scale = 1.5;
          const viewport = page.getViewport({ scale });
          const canvas = document.createElement("canvas");
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          container.appendChild(canvas);
          page.render({ canvasContext: canvas.getContext("2d"), viewport });
        });
      }
    }).catch(err => {
      status.textContent = "No se pudo cargar el PDF: " + err.message;
    });
  </script>
</body>
</html>
