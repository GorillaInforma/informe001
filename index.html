<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor de Informe</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #525659; }
  .container { width: 100%; height: 100vh; display: flex; flex-direction: column; }
  .toolbar {
    background: #323639; color: #fff; padding: 10px 16px;
    font-family: Arial, sans-serif; font-size: 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .toolbar a { color: #8ab4f8; text-decoration: none; }
  iframe { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <span id="status">Cargando InfGorInf19593.pdf...</span>
      <a href="https://raw.githubusercontent.com/GorillaInforma/informe001/main/InfGorInf19593.pdf" target="_blank">Abrir en pestaña nueva ⬈</a>
    </div>
    <iframe id="viewer" style="display:none;"></iframe>
  </div>

  <script>
    const url = "https://raw.githubusercontent.com/GorillaInforma/informe001/main/InfGorInf19593.pdf";
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.blob();
      })
      .then(blob => {
        const pdfBlob = blob.slice(0, blob.size, "application/pdf");
        const blobUrl = URL.createObjectURL(pdfBlob);
        const iframe = document.getElementById("viewer");
        iframe.src = blobUrl;
        iframe.style.display = "block";
        document.getElementById("status").textContent = "InfGorInf19593.pdf";
      })
      .catch(err => {
        document.getElementById("status").textContent = "No se pudo cargar el PDF: " + err.message;
      });
  </script>
</body>
</html>
